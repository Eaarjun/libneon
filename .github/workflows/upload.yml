name: Upload component
on:
  push:
    branches: [ main ]

jobs:
  upload_components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: espressif/upload-components-ci-action@v2
        with:
          components: "my_component: ."
          namespace: "my_namespace"
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
